console_title_template = '{{if .Root}}(Admin) {{end}}{{.Folder}}'
version = 4

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    template = ''
    foreground = '#242424'
    powerline_symbol = ''
    background = '#f1184c'
    type = 'root'
    style = 'powerline'

  [[blocks.segments]]
    leading_diamond = ' '
    template = ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} '
    foreground = '#3A86FF'
    background = '#282c34'
    type = 'os'
    style = 'diamond'

  [[blocks.segments]]
    template = '{{ .CurrentDate | date .Format }} '
    foreground = '#FFBB00'
    powerline_symbol = ''
    background = '#242424'
    type = 'time'
    style = 'powerline'

    [blocks.segments.options]
      time_format = '15:04:05'

  [[blocks.segments]]
    template = ' {{ .Path }} '
    foreground = '#33DD2D'
    powerline_symbol = ''
    background = '#242424'
    type = 'path'
    style = 'powerline'

    [blocks.segments.options]
      folder_separator_icon = '/'
      style = 'folder'

  [[blocks.segments]]
    template = '{{ .UpstreamIcon }}{{ .HEAD }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
    foreground = '#3A86FF'
    powerline_symbol = ''
    background = '#242424'
    type = 'git'
    style = 'powerline'

    [blocks.segments.options]
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    template = '  {{ if .Unsupported }}{{ else }}{{ .Full }}{{ end }} '
    foreground = '#ffffff'
    powerline_symbol = ''
    background = '#0184bc'
    type = 'dotnet'
    style = 'powerline'

  [[blocks.segments]]
    template = ' <#fefefe></> {{ .FormattedMs }} '
    foreground = '#ffffff'
    powerline_symbol = ''
    background = '#8800dd'
    type = 'executiontime'
    style = 'powerline'

    [blocks.segments.options]
      style = 'austin'
      threshold = 1.0

  [[blocks.segments]]
    template = '  '
    foreground = '#242424'
    powerline_symbol = ''
    background = '#33DD2D'
    type = 'status'
    style = 'powerline'
    background_templates = ['{{ if gt .Code 0 }}#f1184c{{ end }}']

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '➜ '
    foreground = '#f1184c'
    type = 'text'
    style = 'plain'
